<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content "width=device-width, initial-scale=1.0">
    <link href="/static/output.css" rel="stylesheet">
    <title>ASX Rising Stocks</title>
    <script src="/static/scripts.js" defer></script>
</head>
<body class="grid grid-cols-6 gap-3 p-2">
    <header class="row-span-1 col-span-full flex items-center">
        <h1 class="text-3xl text-center flex-10">
            ASX Website
        </h1>          
        <a href="settings.html" class="flex-1">
            <button id="btn-settings" class="tab">
                Settings
            </button>
        </a>
    </header>
    <nav class="flex space-x-1  text-center col-span-full row-span-1">
        <h2 class="sr-only">Navigation</h2>
        <button class = "tab">
            <p>Asx top risers</p>
        </button>
        <button class = "tab">
            <p>Asx top turnover</p>
        </button>    
        <button class = "tab relative group">
            <p>Following</p>
            <ul class="opacity-0 absolute group-hover:opacity-100 w-full">
                <li class="tab">first</li>
                <li class ="tab">second</li>
            </ul>
        </button>    
    </nav>
    <table class="border-amber-200 border-2 col-span-2">
        <thead>
            <tr>
                <th class="p-2">
                    <button class="tab"> Symbol </button>
                </th>
                <th class="p-2">Growth</th>
            </tr>
        </thead>
        <tbody>
            <tr class="text-center">
                <td>DTR</td>
                <td id="stock-growth">-5%</td>
            </tr>
        </tbody>
    </table>
    <button id="stock-add" class="col-span-2 row-start-4 text-center tab">
        Add
    </button>
    <main class="border-2 border-red-300 row-span-20 col-start-3 col-span-full p-2">
        <h2 class="sr-only">Stock Chart Widget</h2>
        <div id="widget-container" class="relative">
            
        </div>
        <template id="chart-widget">
            <!-- TradingView Widget BEGIN -->
            <div class="tradingview-widget-container relative" style="height:100%;width:100%">
                <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
                <div class="tradingview-widget-copyright"><a href="https://www.tradingview.com/symbols/NASDAQ-AAPL/" rel="noopener nofollow" target="_blank"><span class="blue-text">AAPL stock chart</span></a><span class="trademark"> by TradingView</span></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
                {
                "allow_symbol_change": true,
                "calendar": false,
                "details": false,
                "hide_side_toolbar": true,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "hide_volume": false,
                "hotlist": false,
                "interval": "D",
                "locale": "en",
                "save_image": true,
                "style": "1",
                "symbol": "NASDAQ:AAPL",
                "theme": "light",
                "timezone": "Etc/UTC",
                "backgroundColor": "#ffffff",
                "gridColor": "rgba(46, 46, 46, 0.06)",
                "watchlist": [],
                "withdateranges": false,
                "compareSymbols": [],
                "studies": [],
                "autosize": true
                }
                </script>
                <!-- added on -->
                <button id="chart-close" class="absolute z-10 tab -top-4 -right-2 opacity-0 hover:opacity-100">
                    Close
                </button>
            </div>
            <!-- TradingView Widget END -->
        </template>
    </main>
</body>
</html>
