<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content "width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>ASX Rising Stocks</title>
    <script src="scripts.js" defer></script>
</head>
<body class="grid grid-cols-6 gap-3 p-2">
    <header class="row-span-1 col-span-full flex">
        <h1 class="text-3xl text-center flex-10">
            ASX Website
        </h1>
        <button class="tab flex-1">
            Settings
        </button>
    </header>
    <nav class="flex space-x-1  text-center col-span-full row-span-1">
        <button class = "tab">
            <p>Asx top risers</p>
        </button>
        <button class = "tab">
            <p>Asx top turnover</p>
        </button>    
        <button class = "tab">
            <p>Following</p>
        </button>    
    </nav>
    <table class="border-amber-200 border-2 col-span-2">
        <thead>
            <tr>
                <th class="p-2">
                    <button class="tab"> Symbol </button>
                </th>
                <th class="p-2">Growth</th>
            </tr>
        </thead>
        <tbody>
            <tr class="text-center">
                <td>DTR</td>
                <td id="stock-growth">-5%</td>
            </tr>
        </tbody>
    </table>
    <div class="border-2 border-red-300 row-span-30 col-start-3 col-span-full p-2">
        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container" style="height:100%;width:100%">
        <div class="tradingview-widget-container__widget" style="height:calc(100% - 32px);width:100%"></div>
        <div class="tradingview-widget-copyright"><a href="https://www.tradingview.com/symbols/NASDAQ-AAPL/" 
            rel="noopener nofollow" target="_blank">
            <span class="blue-text">AAPL stock chart</span></a><span class="trademark"> by TradingView</span></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
        {
        "allow_symbol_change": true,
        "calendar": false,
        "details": false,
        "hide_side_toolbar": true,
        "hide_top_toolbar": false,
        "hide_legend": false,
        "hide_volume": false,
        "hotlist": false,
        "interval": "D",
        "locale": "en",
        "save_image": true,
        "style": "1",
        "symbol": "NASDAQ:AAPL",
        "theme": "light",
        "timezone": "Etc/UTC",
        "backgroundColor": "#ffffff",
        "gridColor": "rgba(46, 46, 46, 0.06)",
        "watchlist": [],
        "withdateranges": false,
        "compareSymbols": [],
        "studies": [],
        "autosize": true
        }
        </script>
        </div>
        <!-- TradingView Widget END -->
    </div>
</body>
</html>
